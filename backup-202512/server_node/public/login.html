<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能家居传感器监控</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🏠 智能家居传感器监控</h1>
            <h2>用户登录</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">登录</button>
                </div>
                
                <div class="form-group">
                    <p class="auth-link">
                        还没有账号？<a href="/register">立即注册</a>
                    </p>
                </div>
            </form>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 检查是否已登录
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const response = await fetch('/api/user', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (response.ok) {
                        window.location.href = '/';
                        return;
                    }
                } catch (error) {
                    // 忽略错误，继续登录流程
                }
            }
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // 隐藏错误信息
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // 禁用提交按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // 保存token到localStorage
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('username', result.user.username);
                    
                    // 跳转到主页
                    window.location.href = '/';
                } else {
                    // 显示错误信息
                    errorDiv.textContent = result.error || '登录失败，请重试';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请检查连接后重试';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });

        // 页面加载时检查认证状态
        checkAuth();
    </script>
</body>
</html>
